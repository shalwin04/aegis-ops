<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 950" fill="none">
  <defs>
    <linearGradient id="splunkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#65A637"/>
      <stop offset="100%" style="stop-color:#4A7A28"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
    <linearGradient id="detectGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#991b1b"/>
    </linearGradient>
    <linearGradient id="githubGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#333"/>
      <stop offset="100%" style="stop-color:#111"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#65A637"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="950" fill="#fafafa"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#000">AegisOps Architecture</text>
  <text x="600" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#666">Autonomous Multi-Agent Incident Response powered by Splunk MCP</text>

  <!-- Data Sources Row -->
  <text x="600" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#888">DATA SOURCES</text>

  <rect x="100" y="115" width="140" height="50" rx="8" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
  <text x="170" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#000">Splunk APM</text>

  <rect x="260" y="115" width="140" height="50" rx="8" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
  <text x="330" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#000">Splunk Security</text>

  <rect x="420" y="115" width="140" height="50" rx="8" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
  <text x="490" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#000">Firewall / WAF</text>

  <rect x="580" y="115" width="140" height="50" rx="8" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
  <text x="650" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#000">Auth Logs</text>

  <rect x="740" y="115" width="140" height="50" rx="8" fill="url(#githubGrad)" filter="url(#shadow)"/>
  <text x="810" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#fff">GitHub Repos</text>

  <!-- Arrows to Splunk MCP -->
  <path d="M170 165 L450 200" stroke="#65A637" stroke-width="1.5"/>
  <path d="M330 165 L500 200" stroke="#65A637" stroke-width="1.5"/>
  <path d="M490 165 L550 200" stroke="#65A637" stroke-width="1.5"/>
  <path d="M650 165 L600 200" stroke="#65A637" stroke-width="1.5"/>

  <!-- Splunk MCP Server -->
  <rect x="400" y="200" width="300" height="120" rx="12" fill="url(#splunkGrad)" filter="url(#shadow)"/>
  <text x="550" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#fff">Splunk MCP Server</text>
  <text x="550" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">Model Context Protocol</text>

  <!-- MCP Tools -->
  <rect x="420" y="270" width="110" height="22" rx="4" fill="rgba(0,0,0,0.3)"/>
  <text x="475" y="285" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">splunk_run_query</text>

  <rect x="540" y="270" width="110" height="22" rx="4" fill="rgba(0,0,0,0.3)"/>
  <text x="595" y="285" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">saia_generate_spl</text>

  <rect x="420" y="295" width="110" height="22" rx="4" fill="rgba(0,0,0,0.3)"/>
  <text x="475" y="310" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">splunk_get_indexes</text>

  <rect x="540" y="295" width="110" height="22" rx="4" fill="rgba(0,0,0,0.3)"/>
  <text x="595" y="310" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">saia_explain_spl</text>

  <!-- Arrow from MCP to Anomaly Detector -->
  <path d="M550 320 L550 350" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Anomaly Detector -->
  <rect x="420" y="355" width="260" height="70" rx="10" fill="url(#detectGrad)" filter="url(#shadow)"/>
  <text x="550" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff">Anomaly Detector</text>
  <text x="550" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Continuous Monitoring | Auto-Detection</text>

  <!-- Detection types -->
  <text x="150" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#666">Latency Spikes</text>
  <text x="280" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#666">Error Surges</text>
  <text x="820" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#666">Security Threats</text>
  <text x="950" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#666">Auth Attacks</text>

  <path d="M200 385 L415 385" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M685 385 L770 385" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Arrow to Incident -->
  <path d="M550 425 L550 455" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Incident Box -->
  <rect x="475" y="460" width="150" height="45" rx="8" fill="#000" filter="url(#shadow)"/>
  <text x="550" y="487" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#fff">INCIDENT</text>

  <!-- Parallel Agents Section -->
  <rect x="100" y="530" width="1000" height="110" rx="12" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="120" y="550" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#888">PARALLEL AGENT EXECUTION (LangGraph)</text>

  <!-- Arrow from Incident to Parallel -->
  <path d="M550 505 L550 530" stroke="#000" stroke-width="2"/>
  <path d="M550 530 L300 560" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M550 530 L800 560" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Healer Agent -->
  <rect x="150" y="565" width="200" height="65" rx="10" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="250" y="592" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff">Healer Agent</text>
  <text x="250" y="612" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#aaa">Observability | APM | Traces | Errors</text>

  <!-- Sentinel Agent -->
  <rect x="750" y="565" width="200" height="65" rx="10" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="850" y="592" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff">Sentinel Agent</text>
  <text x="850" y="612" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#aaa">Security | Threats | Auth | Firewall</text>

  <!-- MCP calls from agents -->
  <path d="M250 565 Q250 450 400 280" stroke="#65A637" stroke-width="1.5" stroke-dasharray="4,2" fill="none"/>
  <path d="M850 565 Q850 450 700 280" stroke="#65A637" stroke-width="1.5" stroke-dasharray="4,2" fill="none"/>
  <text x="310" y="480" font-family="system-ui, sans-serif" font-size="9" fill="#65A637">MCP Query</text>
  <text x="760" y="480" font-family="system-ui, sans-serif" font-size="9" fill="#65A637">MCP Query</text>

  <!-- Arrows from Agents to Correlator -->
  <path d="M250 630 L475 675" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M850 630 L625 675" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Correlator -->
  <rect x="450" y="660" width="200" height="55" rx="10" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="550" y="685" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff">Correlator</text>
  <text x="550" y="703" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#aaa">Merge | Classify | Score Confidence</text>

  <!-- Arrow to Architect -->
  <path d="M550 715 L550 740" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Architect Agent -->
  <rect x="425" y="745" width="250" height="55" rx="10" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="550" y="770" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff">Architect Agent</text>
  <text x="550" y="788" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#aaa">Remediation Plan | Code Fixes | PRs</text>

  <!-- GitHub connection to Architect -->
  <rect x="750" y="745" width="150" height="55" rx="10" fill="url(#githubGrad)" filter="url(#shadow)"/>
  <text x="825" y="770" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff">GitHub API</text>
  <text x="825" y="788" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#aaa">Analyze | Fix | Create PR</text>
  <path d="M675 772 L745 772" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M810 165 L810 740" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Claude AI -->
  <rect x="200" y="745" width="150" height="55" rx="10" fill="#fff" stroke="#000" stroke-width="2" filter="url(#shadow)"/>
  <text x="275" y="770" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#000">Claude AI</text>
  <text x="275" y="788" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#666">Reasoning | Code Gen</text>
  <path d="M350 772 L420 772" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Arrow to Execution -->
  <path d="M550 800 L550 825" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Execution Section -->
  <rect x="100" y="835" width="1000" height="100" rx="12" fill="#f5f5f5" stroke="#000" stroke-width="2"/>
  <text x="120" y="857" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">EXECUTION ENGINE (Auto + Human Approval)</text>

  <!-- Execution Actions -->
  <rect x="120" y="870" width="100" height="50" rx="8" fill="#fff" stroke="#ddd"/>
  <text x="170" y="893" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">WAF Rules</text>
  <text x="170" y="908" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">Block IPs</text>

  <rect x="235" y="870" width="100" height="50" rx="8" fill="#fff" stroke="#ddd"/>
  <text x="285" y="893" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">Network</text>
  <text x="285" y="908" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">Isolation</text>

  <rect x="350" y="870" width="100" height="50" rx="8" fill="#fff" stroke="#ddd"/>
  <text x="400" y="893" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">Splunk Alert</text>
  <text x="400" y="908" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">Monitor</text>

  <rect x="465" y="870" width="100" height="50" rx="8" fill="#fff" stroke="#ddd"/>
  <text x="515" y="893" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">Edge Proc</text>
  <text x="515" y="908" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">Log Routing</text>

  <rect x="580" y="870" width="100" height="50" rx="8" fill="#fff" stroke="#ddd"/>
  <text x="630" y="893" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">Slack</text>
  <text x="630" y="908" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">Notify</text>

  <!-- GitHub PR (highlighted) -->
  <rect x="695" y="870" width="130" height="50" rx="8" fill="url(#githubGrad)" filter="url(#shadow)"/>
  <text x="760" y="890" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff">GitHub PR</text>
  <text x="760" y="908" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#aaa">Human Approval</text>

  <!-- Memory -->
  <rect x="840" y="870" width="130" height="50" rx="8" fill="url(#splunkGrad)" filter="url(#shadow)"/>
  <text x="905" y="890" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff">Memory</text>
  <text x="905" y="908" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">Learning Loop</text>

  <!-- Memory Loop Arrow -->
  <path d="M985 895 Q1050 895 1050 550 Q1050 260 700 260" stroke="#65A637" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowGreen)" fill="none"/>
  <text x="1065" y="580" font-family="system-ui, sans-serif" font-size="10" fill="#65A637" transform="rotate(90 1065 580)">Institutional Memory</text>

  <!-- Legend -->
  <rect x="30" y="865" width="70" height="60" rx="6" fill="#fff" stroke="#ddd"/>
  <text x="65" y="882" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#000">Legend</text>
  <line x1="38" y1="895" x2="58" y2="895" stroke="#000" stroke-width="2"/>
  <text x="62" y="898" font-family="system-ui, sans-serif" font-size="8" fill="#666">Flow</text>
  <line x1="38" y1="912" x2="58" y2="912" stroke="#65A637" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="62" y="915" font-family="system-ui, sans-serif" font-size="8" fill="#666">MCP</text>
</svg>
